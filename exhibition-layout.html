<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exhibition Layout — OTTO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: aliceblue; padding: 2rem; max-width: 900px; }
        .project-title-image { width: 100%; height: 320px; background-color: black; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; }
        .project-title-image span { color: aliceblue; font-size: 2.5rem; font-weight: 700; letter-spacing: 0.3em; }
        .project-url { font-size: 0.8rem; font-weight: 400; color: hsl(0,0%,50%); margin-bottom: 2rem; letter-spacing: 0.05em; }
        .project-description { margin-bottom: 2rem; color: hsl(0,0%,20%); font-weight: 500; }
        .project-description p { font-size: 0.95rem; line-height: 1.7; margin-bottom: 1rem; max-width: 640px; }
        .project-description p span { display: inline-block; background-color: black; color: transparent; border-radius: 2px; user-select: none; }
        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .image-grid .cell { aspect-ratio: 3 / 4; width: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="project-title-image"><img src="IMAGES/PLACEHOLDER.png" alt=""></div>
    <div class="project-url">—</div>
    <div class="project-description">
        <p><span style="width:320px;height:1em;">&nbsp;</span><br><span style="width:280px;height:1em;">&nbsp;</span><br><span style="width:360px;height:1em;">&nbsp;</span><br><span style="width:240px;height:1em;">&nbsp;</span></p>
        <p><span style="width:300px;height:1em;">&nbsp;</span><br><span style="width:340px;height:1em;">&nbsp;</span><br><span style="width:200px;height:1em;">&nbsp;</span></p>
    </div>
    <div class="image-grid">
        <img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt="">
        <img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt="">
        <img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt="">
        <img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt=""><img class="cell" src="IMAGES/PLACEHOLDER.png" alt="">
    </div>
</body>
</html>
