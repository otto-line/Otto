<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>otto</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: aliceblue;
            padding: 2rem;
        }

        .otto-line {
            opacity: 0;
            font-size: 1.2rem;
            line-height: 0.5;
            animation: fadein 0.1s forwards;
        }

        .otto-line:last-child {
            padding-top: 2px;
        }

        @keyframes fadein {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="otto-grid"></div>

<script>
    const lines = [
        "otto is space",
        "otto is place",
        "otto is far away",
        "otto is close to home",
        "otto is cat",
        "otto is a design studio."
    ];

    const greys = [
        "hsl(0,0%,82%)",
        "hsl(0,0%,66%)",
        "hsl(0,0%,52%)",
        "hsl(0,0%,38%)",
        "hsl(0,0%,20%)",
        "hsl(0,0%,0%)"
    ];

    const grid = document.querySelector('.otto-grid');

    lines.forEach((text, i) => {
        const div = document.createElement('div');
        div.classList.add('otto-line');
        div.textContent = text;
        div.style.color = greys[i];
        div.style.animationDelay = `${i * 0.3}s`;
        grid.appendChild(div);
    });
</script>
</body>
</html>
